syntax = "proto3";

package tknz.v1;

option go_package = "go.tknz.dev/pb";

service Spaces {
	rpc Create(SpacesCreateRequest) returns (SpacesCreateResponse);
}

message Space {
	string id   = 1;
	string slug = 2;
}

message SpacesCreateRequest {
	string slug = 1;
}

message SpacesCreateResponse {
	Space space = 1;
}
